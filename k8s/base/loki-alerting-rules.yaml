apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-error-log-alert-rules
  labels:
    loki_rule: "true"
data:
  k8s-error-logs.yaml: |
    groups:
      - name: k8s-error-logs
        rules:
          - alert: KubernetesPodErrorLogs
            expr: |
              sum by (namespace, pod, container) (
                count_over_time({namespace=~".+"} |~ "(?i)error" [5m])
              ) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.namespace }}/{{ $labels.pod }} でエラーログを検出した"
              description: "container={{ $labels.container }} が過去5分間にエラーログを出力している。"
