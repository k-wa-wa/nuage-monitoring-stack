apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - monitoring-pwa
  - loki-alerting-rules.yaml

helmCharts:
- name: kube-prometheus-stack
  releaseName: kube-prometheus-stack
  version: 78.2.1
  repo: https://prometheus-community.github.io/helm-charts
  includeCRDs: true
  valuesFile: helm/prometheus-stack-custom.yaml

- name: loki
  releaseName: loki
  version: 6.55.0
  repo: https://grafana.github.io/helm-charts
  valuesFile: helm/loki-custom.yaml

- name: promtail
  releaseName: promtail
  version: 6.17.0
  repo: https://grafana.github.io/helm-charts
  valuesFile: helm/promtail-custom.yaml

- name: holmes
  releaseName: holmesgpt
  version: 0.34.0
  repo: https://robusta-charts.storage.googleapis.com
  valuesFile: helm/holmesgpt-custom.yaml

# Argo CDでの同期時、loki-0がReadyになるまでSyncフェーズが完了せず、
# post-installフック（Job）が実行されないデッドロック（バケット未作成による起動失敗）を防ぐため、
# JobからHelm Hookアノテーションを削除して通常のJobとしてデプロイする
patches:
  - target:
      group: batch
      version: v1
      kind: Job
      name: loki-minio-post-job
    patch: |-
      - op: remove
        path: /metadata/annotations/helm.sh~1hook
      - op: remove
        path: /metadata/annotations/helm.sh~1hook-delete-policy
