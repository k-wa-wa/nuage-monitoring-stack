loki:
  auth_enabled: false
  isDefault: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 672h # 28日間のretention
  compactor:
    retention_enabled: true
    delete_request_store: s3
  # ruler(アラート評価)の設定。 auth_enabled: false のためテナントは常に "fake"
  rulerConfig:
    enable_api: true
    alertmanager_url: http://kube-prometheus-stack-alertmanager.nuage-monitoring-stack.svc.cluster.local:9093
    storage:
      type: local
      local:
        directory: /rules
    ring:
      kvstore:
        store: inmemory

minio:
  enabled: true
  persistence:
    storageClass: local-path

# gatewayはpromtail/Grafanaから直接loki:3100を参照しているため未使用
gateway:
  enabled: false

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    storageClass: local-path

# k8s-sidecarでConfigMap(label: loki_rule)からアラートルールを /rules/fake に配置する
# ruler.storage.local.directory(/rules) 配下は "fake" テナント固定である前提
sidecar:
  rules:
    enabled: true
    folder: /rules/fake

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
ruler:
  replicas: 0
