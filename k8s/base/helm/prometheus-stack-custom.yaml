namespaceOverride: "nuage-monitoring-stack"

grafana:
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
  grafana.ini:
    server:
      root_url: "https://monitoring.cluster.wpc/grafana/"
      serve_from_sub_path: true
    security:
      allow_embedding: true
    auth.anonymous:
      enabled: true
      org_name: "Main Org."
      org_role: "Viewer"

prometheus:
  prometheusSpec:
    additionalScrapeConfigs:
      - job_name: external-nodes
        scrape_interval: 30s
        static_configs:
          - targets:
              - 10.20.1.21:9100
              - 10.20.1.22:9100
              - 10.20.1.23:9100
            labels: { role: loadbalancer }
          - targets:
              - 10.20.1.30:9100
            labels: { role: egress-gateway }
          - targets:
              - 10.20.1.41:9100
              - 10.20.1.42:9100
              - 10.20.1.43:9100
            labels: { role: postgres-cluster }
          - targets:
              - 10.20.1.71:9100
              - 10.20.1.72:9100
            labels: { role: minio-cluster }

# NOTE: this replaces the chart's default Alertmanager config wholesale.
# pwa-notifier must already be running with a valid VAPID keypair
# (pwa-notifier-secret) before Alertmanager can deliver to it.
alertmanager:
  alertmanagerSpec:
    # pwa-notifier-secret(WEBHOOK_TOKEN)をAlertmanager Podにマウントし、
    # webhook_configsのAuthorizationヘッダとして参照できるようにする
    secrets:
      - pwa-notifier-secret
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: pwa-notifier
      group_by: ["alertname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: pwa-notifier
        webhook_configs:
          - url: http://monitoring-pwa-backend.nuage-monitoring-stack.svc.cluster.local/webhook/alertmanager
            send_resolved: true
            http_config:
              authorization:
                credentials_file: /etc/alertmanager/secrets/pwa-notifier-secret/WEBHOOK_TOKEN
      # chart既定のWatchdog(死活監視用の常時発火アラート)向けルートが
      # route.routes 経由で残るため、その受信先として空の"null"を用意する
      - name: "null"
