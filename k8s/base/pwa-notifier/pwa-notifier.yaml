apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwa-notifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pwa-notifier
  template:
    metadata:
      labels:
        app: pwa-notifier
    spec:
      containers:
        - name: pwa-notifier
          image: ghcr.io/k-wa-wa/nuage-monitoring-stack-pwa-notifier:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: pwa-notifier-secret
                  key: VAPID_PUBLIC_KEY
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: pwa-notifier-secret
                  key: VAPID_PRIVATE_KEY
            - name: VAPID_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: pwa-notifier-secret
                  key: VAPID_SUBJECT
                  optional: true
            - name: WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pwa-notifier-secret
                  key: WEBHOOK_TOKEN
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pwa-notifier
spec:
  selector:
    app: pwa-notifier
  ports:
    - port: 80
      targetPort: 8080
