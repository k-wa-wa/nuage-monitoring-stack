apiVersion: v1
kind: Secret
metadata:
  name: pwa-notifier-secret
  namespace: nuage-monitoring-stack
type: Opaque
stringData:
  VAPID_PUBLIC_KEY: <path:secrets/prod-secrets.yaml#VAPID_PUBLIC_KEY>
  VAPID_PRIVATE_KEY: <path:secrets/prod-secrets.yaml#VAPID_PRIVATE_KEY>
  # Not a secret (RFC 8292 contact identifier) - hardcoded here rather than
  # sops-encrypted. Must stay bare, no "mailto:" prefix: webpush-go prepends
  # "mailto:" itself, and a pre-prefixed value produces "mailto:mailto:..."
  # in the push JWT's sub claim, which Apple's push service rejects (403
  # BadJwtToken).
  VAPID_SUBJECT: dev@example.com
  WEBHOOK_TOKEN: <path:secrets/prod-secrets.yaml#WEBHOOK_TOKEN>
