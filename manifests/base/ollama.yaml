apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
          name: api
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
      - name: model-puller
        image: curlimages/curl:latest
        command:
        - "/bin/sh"
        - "-c"
        - |
          echo "Waiting for Ollama to start..."
          until curl -s http://localhost:11434/api/tags > /dev/null; do
            sleep 2
          done
          
          echo "Ollama started. Pulling model gemma4:e4b..."
          until curl -s -X POST http://localhost:11434/api/pull -d '{"name": "gemma4:e4b"}' | grep -q '"status":"success"'; do
            echo "Pull failed or interrupted. Retrying in 5 seconds..."
            sleep 5
          done
          
          echo "Model pulled successfully. Keeping container alive."
          while true; do
            sleep 3600
          done
      volumes:
      - name: ollama-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  ports:
  - port: 11434
    targetPort: 11434
  selector:
    app: ollama
